<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day Calculator - Business Days/Date Difference/Countdown/Holidays</title>
    <meta name="description" content="Free online day calculator. Calculate business days, date difference, countdown to any date, US holidays 2026.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 10px;
            font-size: 2rem;
        }
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.8);
            margin-bottom: 30px;
        }
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        .tool-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .tool-card h2 {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .input-group {
            margin-bottom: 12px;
        }
        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 4px;
        }
        .input-group input {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .result {
            margin-top: 16px;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 8px;
            text-align: center;
            font-size: 1.1rem;
            color: #333;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .result strong {
            color: #667eea;
            font-size: 1.5rem;
        }
        .holiday-list {
            margin-top: 16px;
            max-height: 300px;
            overflow-y: auto;
        }
        .holiday-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            border-bottom: 1px solid #eee;
        }
        .holiday-item:last-child {
            border-bottom: none;
        }
        .holiday-date {
            color: #667eea;
            font-weight: 600;
        }
        .weekend {
            color: #e74c3c;
        }
        .lang-toggle {
            text-align: center;
            margin-bottom: 20px;
        }
        .lang-toggle button {
            padding: 8px 16px;
            border: 2px solid white;
            background: transparent;
            color: white;
            border-radius: 20px;
            cursor: pointer;
            margin: 0 4px;
            font-weight: 600;
        }
        .lang-toggle button.active {
            background: white;
            color: #667eea;
        }
        .lang-toggle button:hover {
            background: rgba(255,255,255,0.2);
        }
        @media (max-width: 600px) {
            h1 {
                font-size: 1.5rem;
            }
            .tool-card {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 语言切换按钮 -->
        <div class="lang-toggle">
            <button id="langEn" onclick="setLanguage('en')">EN</button>
            <button id="langZh" onclick="setLanguage('zh')">中文</button>
        </div>
        
        <h1 id="mainTitle">📅 Day Calculator</h1>
        <p class="subtitle" id="mainSubtitle">Business Days · Date Difference · Countdown · US Holidays</p>
        
        <div class="tools-grid">
            <!-- 工作日计算器 -->
            <div class="tool-card">
                <h2 id="workDaysTitle">📅 Business Days Calculator</h2>
                <div class="input-group">
                    <label id="workDaysStartLabel">Start Date</label>
                    <input type="date" id="workStartDate">
                </div>
                <div class="input-group">
                    <label id="workDaysEndLabel">End Date</label>
                    <input type="date" id="workEndDate">
                </div>
                <button class="btn" id="workDaysBtn" onclick="calculateWorkDays()">Calculate</button>
                <div class="result" id="workDayResult">Select dates to calculate</div>
            </div>

            <!-- 日期差计算器 -->
            <div class="tool-card">
                <h2 id="dateDiffTitle">📆 Date Difference Calculator</h2>
                <div class="input-group">
                    <label id="dateDiffStartLabel">Start Date</label>
                    <input type="date" id="diffStartDate">
                </div>
                <div class="input-group">
                    <label id="dateDiffEndLabel">End Date</label>
                    <input type="date" id="diffEndDate">
                </div>
                <button class="btn" id="dateDiffBtn" onclick="calculateDateDiff()">Calculate</button>
                <div class="result" id="dateDiffResult">Select dates to calculate</div>
            </div>

            <!-- 倒计时器 -->
            <div class="tool-card">
                <h2 id="countdownTitle">⏰ Countdown Timer</h2>
                <div class="input-group">
                    <label id="countdownDateLabel">Target Date</label>
                    <input type="date" id="countdownDate">
                </div>
                <div class="input-group">
                    <label id="countdownNameLabel">Event Name (optional)</label>
                    <input type="text" id="countdownName" placeholder="Birthday, Holiday, Anniversary...">
                </div>
                <button class="btn" id="countdownBtn" onclick="startCountdown()">Start Countdown</button>
                <div class="result" id="countdownResult">Select a target date</div>
            </div>

            <!-- 美国节假日 -->
            <div class="tool-card">
                <h2 id="holidaysTitle">🇺🇸 US Holidays 2026</h2>
                <div class="holiday-list" id="holidayList"></div>
            </div>
        </div>
    </div>

    <script>
        // 语言包
        const i18n = {
            en: {
                mainTitle: '📅 Day Calculator',
                mainSubtitle: 'Business Days · Date Difference · Countdown · US Holidays',
                workDaysTitle: '📅 Business Days Calculator',
                workDaysStartLabel: 'Start Date',
                workDaysEndLabel: 'End Date',
                workDaysBtn: 'Calculate',
                workDaysResult: 'Select dates to calculate',
                workDaysError: 'End date must be after start date',
                workDaysSuccess: 'Business days:',
                dateDiffTitle: '📆 Date Difference Calculator',
                dateDiffStartLabel: 'Start Date',
                dateDiffEndLabel: 'End Date',
                dateDiffBtn: 'Calculate',
                dateDiffResult: 'Select dates to calculate',
                dateDiffSuccess: 'Difference:',
                countdownTitle: '⏰ Countdown Timer',
                countdownDateLabel: 'Target Date',
                countdownNameLabel: 'Event Name (optional)',
                countdownBtn: 'Start Countdown',
                countdownResult: 'Select a target date',
                countdownPassed: 'has passed',
                countdownAgo: 'ago',
                countdownArrived: 'Time is here!',
                holidaysTitle: '🇺🇸 US Holidays 2026',
                holidaysPast: '(Past)'
            },
            zh: {
                mainTitle: '📅 日历计算器',
                mainSubtitle: '工作日计算 · 日期差计算 · 倒计时 · 美国节假日',
                workDaysTitle: '📅 工作日计算器',
                workDaysStartLabel: '开始日期',
                workDaysEndLabel: '结束日期',
                workDaysBtn: '计算',
                workDaysResult: '选择日期查看结果',
                workDaysError: '结束日期不能早于开始日期',
                workDaysSuccess: '工作日：',
                dateDiffTitle: '📆 日期差计算器',
                dateDiffStartLabel: '开始日期',
                dateDiffEndLabel: '结束日期',
                dateDiffBtn: '计算',
                dateDiffResult: '选择日期查看结果',
                dateDiffSuccess: '相差：',
                countdownTitle: '⏰ 倒计时器',
                countdownDateLabel: '目标日期',
                countdownNameLabel: '事件名称（可选）',
                countdownBtn: '开始倒计时',
                countdownResult: '选择目标日期',
                countdownPassed: '已过去',
                countdownAgo: '天前',
                countdownArrived: '已到来！',
                holidaysTitle: '🇺🇸 2026年美国节假日',
                holidaysPast: '（已过）'
            }
        };

        // 当前语言
        let currentLang = 'en';

        // 设置语言
        function setLanguage(lang) {
            currentLang = lang;
            const t = i18n[lang];
            
            // 更新按钮状态
            document.getElementById('langEn').classList.toggle('active', lang === 'en');
            document.getElementById('langZh').classList.toggle('active', lang === 'zh');
            
            // 更新标题
            document.getElementById('mainTitle').textContent = t.mainTitle;
            document.getElementById('mainSubtitle').textContent = t.mainSubtitle;
            
            // 更新各工具标题和标签
            document.getElementById('workDaysTitle').textContent = t.workDaysTitle;
            document.getElementById('workDaysStartLabel').textContent = t.workDaysStartLabel;
            document.getElementById('workDaysEndLabel').textContent = t.workDaysEndLabel;
            document.getElementById('workDaysBtn').textContent = t.workDaysBtn;
            
            document.getElementById('dateDiffTitle').textContent = t.dateDiffTitle;
            document.getElementById('dateDiffStartLabel').textContent = t.dateDiffStartLabel;
            document.getElementById('dateDiffEndLabel').textContent = t.dateDiffEndLabel;
            document.getElementById('dateDiffBtn').textContent = t.dateDiffBtn;
            
            document.getElementById('countdownTitle').textContent = t.countdownTitle;
            document.getElementById('countdownDateLabel').textContent = t.countdownDateLabel;
            document.getElementById('countdownNameLabel').textContent = t.countdownNameLabel;
            document.getElementById('countdownBtn').textContent = t.countdownBtn;
            
            document.getElementById('holidaysTitle').textContent = t.holidaysTitle;
            
            // 重置结果显示
            document.getElementById('workDayResult').textContent = t.workDaysResult;
            document.getElementById('dateDiffResult').textContent = t.dateDiffResult;
            document.getElementById('countdownResult').textContent = t.countdownResult;
            
            // 更新placeholder
            if (lang === 'en') {
                document.getElementById('countdownName').placeholder = 'Birthday, Holiday, Anniversary...';
            } else {
                document.getElementById('countdownName').placeholder = '生日、假期、纪念日...';
            }
            
            // 重新渲染节假日
            renderHolidays();
            
            // 保存到本地存储
            localStorage.setItem('dayCalcLang', lang);
        }

        // 计算工作日
        function calculateWorkDays() {
            const t = i18n[currentLang];
            const startDate = new Date(document.getElementById('workStartDate').value);
            const endDate = new Date(document.getElementById('workEndDate').value);
            
            if (isNaN(startDate) || isNaN(endDate)) {
                document.getElementById('workDayResult').textContent = t.workDaysResult;
                return;
            }
            
            if (endDate < startDate) {
                document.getElementById('workDayResult').textContent = t.workDaysError;
                return;
            }
            
            let workDays = 0;
            let currentDate = new Date(startDate);
            
            while (currentDate <= endDate) {
                const dayOfWeek = currentDate.getDay();
                if (dayOfWeek !== 0 && dayOfWeek !== 6) {
                    workDays++;
                }
                currentDate.setDate(currentDate.getDate() + 1);
            }
            
            document.getElementById('workDayResult').innerHTML = 
                `${t.workDaysSuccess}<strong>${workDays}</strong> ${currentLang === 'en' ? 'days' : '天'}`;
        }

        // 计算日期差
        function calculateDateDiff() {
            const t = i18n[currentLang];
            const startDate = new Date(document.getElementById('diffStartDate').value);
            const endDate = new Date(document.getElementById('diffEndDate').value);
            
            if (isNaN(startDate) || isNaN(endDate)) {
                document.getElementById('dateDiffResult').textContent = t.dateDiffResult;
                return;
            }
            
            const diffTime = Math.abs(endDate - startDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            document.getElementById('dateDiffResult').innerHTML = 
                `${t.dateDiffSuccess}<strong>${diffDays}</strong> ${currentLang === 'en' ? 'days' : '天'}`;
        }

        // 倒计时
        let countdownInterval;
        function startCountdown() {
            const t = i18n[currentLang];
            const targetDate = new Date(document.getElementById('countdownDate').value);
            const eventName = document.getElementById('countdownName').value || (currentLang === 'en' ? 'that day' : '那一天');
            
            if (isNaN(targetDate)) {
                document.getElementById('countdownResult').textContent = t.countdownResult;
                return;
            }
            
            // 清除之前的interval
            if (countdownInterval) clearInterval(countdownInterval);
            
            const updateCountdown = () => {
                const now = new Date();
                const diff = targetDate - now;
                
                if (diff < 0) {
                    const days = Math.abs(Math.floor(diff / (1000 * 60 * 60 * 24)));
                    document.getElementById('countdownResult').innerHTML = 
                        `<strong>${t.countdownPassed}</strong><br>${eventName} ${days} ${t.countdownAgo}`;
                    return;
                }
                
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                
                const dayText = currentLang === 'en' ? 'days' : '天';
                const hourText = currentLang === 'en' ? 'hrs' : '时';
                const minText = currentLang === 'en' ? 'min' : '分';
                const secText = currentLang === 'en' ? 'sec' : '秒';
                
                document.getElementById('countdownResult').innerHTML = 
                    `→ <strong>${eventName}</strong><br>${days} ${dayText} ${hours} ${hourText} ${minutes} ${minText} ${seconds} ${secText}`;
            };
            
            updateCountdown();
            countdownInterval = setInterval(updateCountdown, 1000);
        }

        // 美国2026年节假日
        const holidays2026 = [
            { date: '2026-01-01', name: "New Year's Day", nameCn: '元旦' },
            { date: '2026-01-19', name: 'Martin Luther King Jr. Day', nameCn: '马丁·路德·金纪念日' },
            { date: '2026-02-16', name: "Presidents' Day", nameCn: '总统日' },
            { date: '2026-05-25', name: 'Memorial Day', nameCn: '阵亡将士纪念日' },
            { date: '2026-06-19', name: 'Juneteenth', nameCn: '六月节' },
            { date: '2026-07-04', name: 'Independence Day', nameCn: '独立日' },
            { date: '2026-09-07', name: 'Labor Day', nameCn: '劳动节' },
            { date: '2026-10-12', name: 'Columbus Day', nameCn: '哥伦布日' },
            { date: '2026-11-11', name: 'Veterans Day', nameCn: '退伍军人节' },
            { date: '2026-11-26', name: 'Thanksgiving Day', nameCn: '感恩节' },
            { date: '2026-12-25', name: 'Christmas Day', nameCn: '圣诞节' }
        ];

        function renderHolidays() {
            const container = document.getElementById('holidayList');
            const today = new Date().toISOString().split('T')[0];
            const t = i18n[currentLang];
            
            container.innerHTML = holidays2026.map(holiday => {
                const isPast = holiday.date < today;
                const name = currentLang === 'en' ? holiday.name : holiday.nameCn;
                return `
                    <div class="holiday-item ${isPast ? 'weekend' : ''}">
                        <span>${name} ${isPast ? t.holidaysPast : ''}</span>
                        <span class="holiday-date">${holiday.date}</span>
                    </div>
                `;
            }).join('');
        }

        // 初始化
        function init() {
            // 设置默认日期为今天
            const today = new Date().toISOString().split('T')[0];
            document.querySelectorAll('input[type="date"]').forEach(input => {
                input.value = today;
            });
            
            // 检测浏览器语言
            const browserLang = navigator.language || navigator.userLanguage;
            let lang = 'en';
            if (browserLang.toLowerCase().startsWith('zh')) {
                lang = 'zh';
            }
            
            // 优先使用本地存储的语言设置
            const savedLang = localStorage.getItem('dayCalcLang');
            if (savedLang) {
                lang = savedLang;
            }
            
            // 设置语言
            setLanguage(lang);
        }

        init();
    </script>
</body>
</html>
